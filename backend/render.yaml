services:
  - type: web
    name: dependency-analyzer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: NVD_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
